<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details | Darinworks</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<!-- 🛡️ Script ป้องกันการ Copy และคลิกขวา (เด้งหน้ารหัส Matrix) -->
  <script>
    // ดักจับการคลิกขวาแล้วเตะไปหน้าใหม่ทันที
    document.addEventListener('contextmenu', function(event) {
        event.preventDefault(); 
        window.open('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js', '_blank');
    });

    // บล็อกคีย์ลัดสายส่อง (F12, Ctrl+U, Ctrl+Shift+I)
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'i'.charCodeAt(0))) || 
            (e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0) || e.keyCode == 'u'.charCodeAt(0)))) {
            
            e.preventDefault();
            window.open('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js', '_blank');
            return false;
        }
    }
  </script>
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    
    .back-btn {
      display: inline-block;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 30px;
      transition: color 0.3s ease;
      align-self: flex-start;
      width: 100%;
      text-align: left;
    }
    .back-btn:hover {
      color: #D4AF37;
    }
    .back-btn i {
      margin-right: 8px;
    }

    .page-logo {
      width: 60px;
      height: auto;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    h1 {
      margin-bottom: 5px;
      font-size: 32px;
      letter-spacing: 1px;
      color: #FFF;
    }
    .subtitle {
      color: #D4AF37;
      margin-bottom: 40px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* โซน Timeline */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 40px;
      margin-bottom: 50px;
    }
    
    .timeline-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
      text-align: left;
    }
    
    .day-badge {
      background: #D4AF37;
      color: #111;
      display: inline-block;
      padding: 5px 15px;
      font-weight: bold;
      font-size: 14px;
      border-bottom-right-radius: 10px;
    }

    .timeline-item img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid #333;
    }

    .content {
      padding: 20px;
    }
    .content h3 {
      margin: 0 0 10px 0;
      font-size: 20px;
      color: #FFF;
    }
    .content p {
      margin: 0;
      font-size: 15px;
      color: #aaa;
      line-height: 1.6;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: #444;
      margin: 0 auto 30px auto;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- ปุ่มกลับไปหน้าเลือกโปรเจกต์ -->
    <a href="prototype.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Prototype Series</a>

    <!-- โลโก้ -->
    <a href="index.html" style="display: inline-block;">
      <img src="darin-guitar-logo.png" alt="Darinworks Logo" class="page-logo">
    </a>

    <!-- ชื่อโปรเจกต์ (แก้ให้ตรงกับงานในไฟล์นั้นๆ) -->
    <h1>The 10-Day Build</h1>
    <p class="subtitle">Ebony Custom Cue</p>

    <!-- กล่อง Timeline เรียงลงมา -->
    <div class="timeline">
      
      <!-- สเต็ปที่ 1 -->
      <div class="timeline-item">
        <div class="day-badge">DAY 1</div>
        <img src="day1.jpg" alt="Day 1">
        <div class="content">
          <h3>Wood Selection</h3>
          <p>อธิบายขั้นตอนการทำงานของสเต็ปนี้...</p>
        </div>
      </div>

      <!-- สเต็ปที่ 2 -->
      <div class="timeline-item">
        <div class="day-badge">DAY 2</div>
        <img src="day2.jpg" alt="Day 2">
        <div class="content">
          <h3>Splicing & Assembly</h3>
          <p>อธิบายขั้นตอนการทำงานของสเต็ปนี้...</p>
        </div>
      </div>

      <!-- สเต็ปที่ 3 -->
      <div class="timeline-item">
        <div class="day-badge">DAY 3</div>
        <img src="day3.jpg" alt="Day 3">
        <div class="content">
          <h3>Shaping</h3>
          <p>อธิบายขั้นตอนการทำงานของสเต็ปนี้...</p>
        </div>
      </div>

    </div>

    <div class="divider"></div>
    <!-- ปุ่มกลับไปหน้าเลือกโปรเจกต์ -->
    <a href="prototype.html" class="back-btn" style="text-align: center; width: auto;"><i class="fa-solid fa-arrow-left"></i> Back to Prototype Series</a>

  </div>
</body>
</html>
