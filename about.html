    <h1>About Darinworks</h1>
    <p class="subtitle">The Blueprint of a Masterpiece</p>

    <!-- Block 1: The Origin -->
    <div class="story-block">
      <img class="story-img" src="images/about/bank-profile.jpg" alt="ช่างแบงค์ Darinworks">
      <div class="story-text">
        <h2>จากระบบเครือข่าย สู่เส้นสายของลายไม้</h2>
        <p>หลายคนอาจสงสัยว่า ทำไมผู้ชายที่ขลุกอยู่กับสายงาน IT Infrastructure มาตั้งแต่ปี 2005 ถึงหันมาหลงใหลในกลิ่นขี้เลื่อยและงานไม้?</p>
        <p>ตลอดระยะเวลากว่า 20 ปีในการออกแบบและบริหารจัดการระบบเซิร์ฟเวอร์ สิ่งเหล่านี้ได้หล่อหลอม <span class="highlight">"กระบวนการคิดแบบวิศวกร"</span> ให้กับผม ทุกปัญหามีโครงสร้าง และทุกผลลัพธ์เกิดจากการคำนวณที่ไร้ข้อผิดพลาด</p>
        <p>จนกระทั่งวันหนึ่ง ผมได้สัมผัสกับเสน่ห์ของไม้ไทยหายาก... วัสดุธรรมชาติที่ไม่มีความสมบูรณ์แบบตายตัว ผมจึงตั้งคำถามว่า จะเกิดอะไรขึ้นถ้าเราเอา "ความแม่นยำของวิศวกรรม" มาจัดระเบียบ "ความงามของธรรมชาติ"</p>
      </div>
    </div>

    <!-- Block 2: The Philosophy -->
    <div class="story-block reverse">
      <img class="story-img" src="images/about/engineering-philosophy.jpg" alt="การออกแบบด้วย Fusion 360">
      <div class="story-text">
        <h2>ปรัชญาการทำงาน: Engineering meets Artisan</h2>
        <p>ที่ Darinworks เราไม่ได้แค่ "เหลาไม้" แต่เรา <span class="highlight">"คำนวณ"</span> มัน</p>
        <p>ในขณะที่งาน Luthier หรือการทำไม้คิวแบบดั้งเดิมอาศัยสัญชาตญาณเพียงอย่างเดียว เราเลือกที่จะลดข้อผิดพลาดนั้นให้เหลือศูนย์ ทุกโปรเจกต์จะถูกขึ้นแบบจำลอง 3D ด้วย <b>Fusion 360</b> เพื่อคำนวณจุดศูนย์ถ่วง (Balance) และความเค้น</p>
        <p>โครงสร้างหลักจะถูกกัดขึ้นรูปด้วย <b>เครื่อง CNC</b> เพื่อความสมมาตร 100% ก่อนจะส่งผ่านเข้าสู่กระบวนการ Hand-finished โดยช่างฝีมือ เพื่อรักษาจิตวิญญาณและความอบอุ่นที่เครื่องจักรให้ไม่ได้</p>
      </div>
    </div>

    <!-- Block 3: The Material -->
    <div class="story-block">
      <img class="story-img" src="images/about/rare-woods.jpg" alt="คลังไม้ไทยหายาก">
      <div class="story-text">
        <h2>เสน่ห์แห่งไม้ไทยที่โลกต้องจดจำ</h2>
        <p>เครื่องดนตรีที่ดี ต้องเริ่มจากวัตถุดิบระดับตำนาน Darinworks ทุ่มเทให้กับการเป็นภัณฑารักษ์คลังไม้ไทยหายาก ไม่ว่าจะเป็นความหนาแน่นอันเป็นเอกลักษณ์ของ <span class="highlight">พญางิ้วดำ (Black Ebony)</span>, กลิ่นหอมของ <span class="highlight">เทพทาโร</span> หรือมิติสีที่ลึกลับของ <span class="highlight">ไม้เสลา</span></p>
        <p>ไม้ทุกชิ้นผ่านกระบวนการอบแห้งและคัดเลือกสเกรนอย่างเข้มงวด เพื่อให้มั่นใจว่าเมื่อมันถูกแปรสภาพเป็นกีตาร์หรือไม้คิว มันจะส่งเสียงและให้สัมผัสที่สมบูรณ์แบบที่สุด... สู่มือของคุณ</p>
      </div>
    </div>

    <div class="quote-box">
      "งานคราฟต์ที่ดี ไม่ได้วัดกันที่ความยากลำบากในการสร้าง แต่วัดกันที่ความสมบูรณ์แบบเมื่อผลงานนั้นถูกใช้งานจริง" <br>
      <span style="display: block; margin-top: 15px; font-size: 16px; color: #D4AF37; font-style: normal;">— ช่างแบงค์, Founder of Darinworks</span>
    </div>
