  <style>
    /* CSS ตกแต่งฟอร์มเพิ่มเติมให้เข้ากับธีม */
    .config-section { 
      background: var(--surface-2); 
      border: 1px solid rgba(255,255,255,0.05); 
      border-radius: 15px; 
      padding: 40px; 
      margin: 30px 0;
      width: 100%;
      max-width: 600px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    .form-group { margin-bottom: 25px; text-align: left; }
    
    label { 
      display: block; 
      margin-bottom: 10px; 
      color: var(--gold); 
      font-size: 11px; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      font-family: 'Jost', sans-serif;
    }

    select, input, textarea { 
      width: 100%; 
      padding: 14px; 
      background: rgba(0,0,0,0.3); 
      border: 1px solid rgba(255,255,255,0.1); 
      color: var(--text); 
      border-radius: 8px; 
      box-sizing: border-box; 
      font-size: 15px;
      font-family: 'Jost', sans-serif;
      transition: all 0.3s;
    }

    select:focus, input:focus, textarea:focus { 
      border-color: var(--gold); 
      outline: none; 
      background: rgba(0,0,0,0.5);
    }

    .btn-line { 
      width: 100%; 
      background: var(--gold); 
      color: #000; 
      padding: 18px; 
      border: none; 
      border-radius: 8px; 
      font-weight: 600; 
      cursor: pointer;
      font-size: 15px; 
      letter-spacing: 1px;
      transition: 0.4s; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 12px;
      font-family: 'Jost', sans-serif;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .btn-line:hover { 
      background: var(--gold-light); 
      transform: translateY(-3px); 
      box-shadow: 0 10px 20px rgba(0,0,0,0.4); 
    }

    .back-btn-top { 
      align-self: flex-start; 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
      color: var(--text-muted); 
      text-decoration: none; 
      font-size: 11px; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
      margin-bottom: 30px; 
      transition: 0.3s; 
    }
    .back-btn-top:hover { color: var(--gold); }
  </style>
</head>
<body class="theme-guitar">

 <div class="top-line"></div>
  <main class="page">

    <div class="brand-logo-container">
      <img src="images/ui/darin-guitar-logo.png" class="logo-guitar" alt="Darin Guitar" style="margin: 0 auto; display: block;">
    </div>
    
    <h1>GUITAR CUSTOM BUILD</h1>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line r"></div>
    </div>
    <p class="subtitle">เลือกสเปกที่คุณต้องการ เพื่อรับคำปรึกษาจากช่างแบงค์</p>

    <div class="config-section">
      <form id="orderForm">
        <div class="form-group">
          <label>ชื่อ-นามสกุล (Customer Name)</label>
          <input type="text" id="name" placeholder="ชื่อของคุณ" required>
        </div>

        <div class="form-group">
          <label>ชนิดไม้ (Body Wood)</label>
          <select id="wood">
            <option value="ไม้ดำดง (Black Ebony)">ไม้ดำดง (Black Ebony)</option>
            <option value="ไม้ชิงชัน ไม้ตะแบก  (Tepparo)">ไม้ชิงชัน ไม้ตะแบก  (Tepparo)</option>
            <option value="เสลา (Selao)">เสลา (Selao)</option>
          </select>
        </div>

        <div class="form-group">
          <label>ประเภทปิ๊กอัพ (Pickup Type)</label>
          <select id="pickup">
            <option value="Single Coil">Single Coil</option>
            <option value="Humbucker">Humbucker</option>
          </select>
        </div>

        <div class="form-group">
          <label>รายละเอียดเพิ่มเติม (Special Requests)</label>
          <textarea id="remark" rows="4" placeholder="ระบุความต้องการพิเศษ เช่น ทรงคอที่ชอบ หรือต้องการทำสีแบบไหน"></textarea>
        </div>

        <button type="button" class="btn-line" onclick="sendToLine()">
          <i class="fa-brands fa-line"></i> สรุปสเปกและขอคำปรึกษาช่างแบงค์
        </button>
      </form>
    </div>

    <p style="text-align: center; font-size: 11px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 40px;">
      Aesthetics of Sound and Woodcraft.
    </p>

    <div style="text-align: center; width: 100%; margin-bottom: 40px; opacity: 0; animation: fadeUp 0.8s 0.6s forwards;">

  <script>
    function sendToLine() {
      // ดึงข้อมูลจากฟอร์ม
      const name = document.getElementById('name').value;
      const wood = document.getElementById('wood').value;
      const pickup = document.getElementById('pickup').value;
      const remark = document.getElementById('remark').value;

      if (!name) {
        alert("กรุณาระบุชื่อก่อนส่งข้อมูลครับ");
        return;
      }

      // สร้างข้อความ
      const message = `สวัสดีครับคุณแบงค์ ผมชื่อ ${name} สนใจสั่งทำ Custom Guitar ครับ%0A%0A--- สเปกที่เลือก ---%0A- ชนิดไม้: ${wood}%0A- ปิ๊กอัพ: ${pickup}%0A- รายละเอียดเพิ่มเติม: ${remark || '-'}`;

      // ลิงก์ LINE
      const lineUrl = `https://line.me/R/msg/text/?${message}`;
      
      // เปิดหน้า LINE
      window.open(lineUrl, '_blank');
    }
  </script>
