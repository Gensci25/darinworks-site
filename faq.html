  <div class="container">

    <h1>FAQ</h1>
    <p class="subtitle">คำถามที่พบบ่อย (Frequently Asked Questions)</p>

    <div class="faq-container">

      <!-- Category 1 -->
      <div class="faq-category"><i class="fa-solid fa-hammer"></i> 1. งานสั่งทำ (Custom Build)</div>
      
      <div class="faq-item">
        <div class="faq-question">
          ระยะเวลาในการผลิตกีตาร์หรือไม้คิวคัสตอม ใช้เวลานานเท่าไหร่? <i class="fa-solid fa-plus icon-plus"></i>
        </div>
        <div class="faq-answer">
          โดยปกติงานสั่งทำกีตาร์และไม้คิวจะใช้เวลาประมาณ 3-6 เดือน ขึ้นอยู่กับคิวงานและความซับซ้อนของแบบ เนื่องจากงานทุกชิ้นเราต้องใช้เวลาในการคำนวณโครงสร้าง ขึ้นรูปด้วยความแม่นยำสูง และขัดแต่งด้วยความประณีตเพื่อให้ได้ผลลัพธ์ระดับมาสเตอร์พีซ
        </div>
      </div>

      <div class="faq-item">
        <div class="faq-question">
          ราคาเริ่มต้นอยู่ที่เท่าไหร่ และมีระบบการชำระเงินอย่างไร? <i class="fa-solid fa-plus icon-plus"></i>
        </div>
        <div class="faq-answer">
          ราคาขึ้นอยู่กับชนิดของไม้และสเปกฮาร์ดแวร์ที่ลูกค้าเลือก (สามารถสอบถามเพื่อประเมินราคาเบื้องต้นได้ฟรี) สำหรับเงื่อนไขการชำระเงิน ทางร้านจะให้มัดจำ 50% ก่อนเริ่มดำเนินการสั่งของและขึ้นแบบ และชำระส่วนที่เหลือเมื่องานเสร็จสมบูรณ์พร้อมส่งมอบ
        </div>
      </div>

      <!-- Category 2 -->
      <div class="faq-category"><i class="fa-solid fa-microchip"></i> 2. วัสดุและวิศวกรรม (Materials & Engineering)</div>
      
      <div class="faq-item">
        <div class="faq-question">
          การสร้างด้วยเทคโนโลยี CNC และ CAD แตกต่างจากงานทำมือ 100% อย่างไร? <i class="fa-solid fa-plus icon-plus"></i>
        </div>
        <div class="faq-answer">
          การขึ้นรูปด้วย CNC ให้ความสมมาตรและความแม่นยำในระดับ 0.1 มิลลิเมตร ซึ่งช่วยให้การคำนวณความเค้น (Stress) และจุดศูนย์ถ่วง (Balance) ที่ออกแบบจากโปรแกรม 3D มีความเสถียรที่สุด ซึ่งเป็นสิ่งที่งานทำมือล้วนๆ ไม่สามารถควบคุมให้เป๊ะได้ทุกจุด
        </div>
      </div>

      <div class="faq-item">
        <div class="faq-question">
          ลูกค้าสามารถนำไม้มาเอง หรือเลือกไม้หายากของทางร้านได้หรือไม่? <i class="fa-solid fa-plus icon-plus"></i>
        </div>
        <div class="faq-answer">
          ทางร้านมีคลังไม้ไทยหายากที่ผ่านการอบแห้งแล้วเตรียมไว้ให้เลือก เช่น พญางิ้วดำ, เทพทาโร, หรือไม้เสลา อย่างไรก็ตาม หากลูกค้านำไม้ส่วนตัวมาให้ทำ ทางเรายินดีรับพิจารณา โดยจะต้องขอประเมินค่าความชื้นและความหนาแน่นของไม้แผ่นนั้นก่อนครับ
        </div>
      </div>

      <!-- Category 3 -->
      <div class="faq-category"><i class="fa-solid fa-screwdriver-wrench"></i> 3. บริการและซ่อมบำรุง (Clinic & Setup)</div>
      
      <div class="faq-item">
        <div class="faq-question">
          รับเซ็ตอัพกีตาร์ หรือซ่อม/ดัดไม้คิว ของแบรนด์อื่นหรือไม่? <i class="fa-solid fa-plus icon-plus"></i>
        </div>
        <div class="faq-answer">
          ยินดีให้บริการครับ ไม่ว่าจะเป็นกีตาร์แบรนด์เนม หรือไม้คิวจากสำนักอื่น ทาง Darinworks รับบริการซ่อมแซม ดัดคิวคด เปลี่ยนหัวคิว และเซ็ตอัพเต็มระบบ เพื่อดึงสมรรถนะที่ดีที่สุดของเครื่องดนตรีและอุปกรณ์ของคุณออกมา
        </div>
      </div>

      <div class="faq-item">
        <div class="faq-question">
          หากต้องการสั่งทำหรือส่งซ่อม ต้องเริ่มต้นอย่างไร? <i class="fa-solid fa-plus icon-plus"></i>
        </div>
        <div class="faq-answer">
          ลูกค้าสามารถแอด LINE หรือส่งข้อความทาง WhatsApp (ที่เมนูด้านล่าง) เพื่อส่งรูปภาพหรือแจ้งความประสงค์เบื้องต้นให้ช่างประเมินก่อนได้ครับ จากนั้นจึงนัดหมายคิวเพื่อนำเครื่องดนตรีหรือไม้คิวเข้ามาที่ช็อป
        </div>
      </div>

    </div> <!-- End FAQ Container -->

    <div class="divider"></div>

  </div>

  <!-- JavaScript สำหรับระบบ Accordion เปิด/ปิด กล่อง FAQ -->
  <script>
    const faqItems = document.querySelectorAll('.faq-item');

    faqItems.forEach(item => {
      const question = item.querySelector('.faq-question');
      question.addEventListener('click', () => {
        // ให้ปิดกล่องอื่นที่เปิดอยู่ก่อน (ถ้าอยากให้เปิดพร้อมกันได้หลายกล่อง ให้ลบ 3 บรรทัดล่างนี้ออก)
        faqItems.forEach(otherItem => {
          if (otherItem !== item) {
            otherItem.classList.remove('active');
          }
        });
        
        // สลับสถานะเปิด/ปิดของกล่องที่คลิก
        item.classList.toggle('active');
      });
    });
  </script>
