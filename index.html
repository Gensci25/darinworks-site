<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darinworks</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 0;
    }
    .container {
      max-width: 500px; 
      padding: 20px;
      width: 100%;
    }
    
    h1 {
      margin-bottom: 5px;
      font-size: 36px;
      letter-spacing: 1px;
    }
    .subtitle {
      color: #aaa;
      margin-bottom: 10px;
      line-height: 1.6;
      font-size: 16px;
    }
    .description {
      color: #888;
      margin-bottom: 30px; 
      line-height: 1.6;
      font-size: 14px;
      padding: 0 20px;
    }

    /* โซนผลงานหลัก */
    .category-group {
      margin-bottom: 30px; 
      background: rgba(255, 255, 255, 0.02);
      padding: 20px;
      border-radius: 15px;
    }
    .category-logo {
      width: 100px; 
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 10px auto; 
      display: block;
      border: 2px solid #333;
    }
    .btn {
      display: inline-block; 
      margin: 0 auto 10px auto; 
      padding: 10px 18px; 
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #D4AF37; 
      border-color: #D4AF37; 
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); 
      transform: translateY(-2px);
    }
    .sub-social {
      display: flex;
      justify-content: center;
      gap: 10px; 
    }
    .sub-social a {
      text-decoration: none;
      font-size: 26px; 
      transition: all 0.3s ease;
      opacity: 0.9;
    }
    .sub-social a:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    /* โซน Contact */
    .divider {
      width: 50px;
      height: 1px;
      background: #444;
      margin: 10px auto 20px auto;
    }
    .contact-title {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 15px;
      font-weight: normal;
    }
    .contact-social {
      display: flex;
      justify-content: center;
      gap: 15px; 
    }
    .contact-social a {
      text-decoration: none;
      font-size: 32px; 
      transition: all 0.3s ease;
    }

    /* โซนเมนู Tab ด้านล่างสุด (ทำตัวเป็น Footer) */
    .minimal-tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px 10px; 
      margin: 50px auto 10px auto; /* เพิ่มระยะห่างด้านบนให้แยกขาดจากปุ่มติดต่อ */
      padding: 0 15px;
    }
    .minimal-tabs a {
      color: #666; /* ดรอปสีลงนิดหน่อยให้เป็นเมนูรอง */
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    .minimal-tabs a:hover {
      color: #D4AF37; /* เอาเมาส์ชี้แล้วค่อยสว่างเป็นสีทอง */
    }
    .separator {
      color: #333; 
      font-size: 11px;
      user-select: none; 
    }

    /* แบรนด์คัลเลอร์ */
    .fa-facebook { color: #1877F2; }
    .fa-youtube { color: #FF0000; }
    .fa-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .fa-line { color: #00C300; }
    .fa-tiktok { color: #FFFFFF; }
    .fa-whatsapp { color: #25D366; }
  </style>
</head>
<body>

  </div>
</body>
