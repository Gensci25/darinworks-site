<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darinworks</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh; /* เปลี่ยนเป็น min-height เผื่อเนื้อหายาวขึ้น */
      text-align: center;
      padding: 20px 0;
    }
    .container {
      max-width: 500px;
      padding: 20px;
      width: 100%;
    }
    h1 {
      margin-bottom: 5px;
      font-size: 36px;
      letter-spacing: 1px;
    }
    p.subtitle {
      color: #aaa;
      margin-bottom: 40px;
      line-height: 1.6;
      font-size: 15px;
    }
    
    /* สไตล์หมวดหมู่ผลงาน */
    .category-group {
      margin-bottom: 35px; /* ระยะห่างระหว่างกลุ่มผลงาน */
    }

    /* สไตล์ปุ่มหลัก */
    .btn {
      display: block;
      margin: 0 0 12px 0;
      padding: 16px;
      border: 1px solid #444;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
    }
    .btn:hover {
      background: #333;
      border-color: #888;
      transform: translateY(-2px);
    }

    /* สไตล์ไอคอนใต้ปุ่ม */
    .sub-social {
      display: flex;
      justify-content: center;
      gap: 15px; 
    }
    .sub-social a {
      text-decoration: none;
      font-size: 24px; /* ขนาดไอคอนใต้ปุ่ม */
      transition: all 0.3s ease;
      opacity: 0.9;
    }
    .sub-social a:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    /* สัดส่วนโซนติดต่อสอบถาม (Contact Us) */
    .divider {
      width: 50px;
      height: 1px;
      background: #444;
      margin: 10px auto 20px auto;
    }
    h3.contact-title {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 15px;
      font-weight: normal;
    }
    .contact-social {
      display: flex;
      justify-content: center;
      gap: 20px; 
    }
    .contact-social a {
      text-decoration: none;
      font-size: 32px; /* ให้ไอคอนติดต่อใหญ่กว่าไอคอนโซเชียลนิดนึง */
      transition: all 0.3s ease;
    }
    .contact-social a:hover {
      transform: scale(1.1);
    }

    /* สีแบรนด์ไอคอน */
    .fa-facebook { color: #1877F2; }
    .fa-youtube { color: #FF0000; }
    .fa-instagram {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .fa-line { color: #00C300; }
    .fa-tiktok { color: #FFFFFF; }
    .fa-whatsapp { color: #25D366; } /* เพิ่มสี WhatsApp */
  </style>
</head>
<body>
  <div class="container">
    <h1>Darinworks</h1>
    <p class="subtitle">ศิลปะแห่งงานไม้ ผสานวิศวกรรมเพื่อความสมบูรณ์แบบ<br>
    Premium custom guitars and snooker cues.</p>

    <div class="category-group">
      <a href="ลิงก์GoogleDriveกีต้าร์" class="btn" target="_blank">Handmade Guitar</a>
      <div class="sub-social">
        <a href="ลิงก์เพจFacebookกีต้าร์" target="_blank" title="Facebook Page: Guitar"><i class="fa-brands fa-facebook"></i></a>
        <a href="ลิงก์IG" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
      </div>
    </div>

    <div class="category-group">
      <a href="ลิงก์GoogleDriveไม้คิว" class="btn" target="_blank">Handmade Cues</a>
      <div class="sub-social">
        <a href="ลิงก์เพจFacebookไม้คิว" target="_blank" title="Facebook Page: Cues"><i class="fa-brands fa-facebook"></i></a>
        <a href="ลิงก์YouTube" target="_blank" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
        <a href="ลิงก์TikTok" target="_blank" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
      </div>
    </div>

    <div class="divider"></div>
    <h3 class="contact-title">Contact Us</h3>
    <div class="contact-social">
      <a href="ลิงก์LINE" target="_blank" title="LINE"><i class="fa-brands fa-line"></i></a>
      <a href="https://wa.me/66เบอร์โทรศัพท์ของคุณ" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

  </div>
</body>
</html>
