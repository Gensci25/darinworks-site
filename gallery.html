<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Darinworks</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<!-- 🛡️ Script ป้องกันการ Copy และคลิกขวา (เด้งหน้ารหัส Matrix) -->
  <script>
    // ดักจับการคลิกขวาแล้วเตะไปหน้าใหม่ทันที
    document.addEventListener('contextmenu', function(event) {
        event.preventDefault(); 
        window.open('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js', '_blank');
    });

    // บล็อกคีย์ลัดสายส่อง (F12, Ctrl+U, Ctrl+Shift+I)
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'i'.charCodeAt(0))) || 
            (e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0) || e.keyCode == 'u'.charCodeAt(0)))) {
            
            e.preventDefault();
            window.open('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js', '_blank');
            return false;
        }
    }
  </script>
  
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: white; min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 800px; width: 100%; text-align: center; }
    .back-btn { display: inline-block; color: #aaa; text-decoration: none; font-size: 14px; margin-bottom: 30px; align-self: flex-start; text-align: left; width: 100%; }
    .back-btn:hover { color: #D4AF37; }
    .page-logo { width: 60px; margin-bottom: 20px; opacity: 0.9; }
    h1 { font-size: 32px; letter-spacing: 1px; margin-bottom: 5px; }
    .subtitle { color: #D4AF37; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
    
    /* สไตล์ Grid สำหรับรูปผลงาน */
    .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
    .gallery-grid img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; border: 1px solid #333; transition: transform 0.3s; }
    .gallery-grid img:hover { transform: scale(1.02); border-color: #D4AF37; }
    
    .section-title { color: #D4AF37; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; margin: 40px 0 20px 0; border-bottom: 1px solid #333; padding-bottom: 10px; text-align: left; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    <img src="darin-guitar-logo.png" alt="Darinworks Logo" class="page-logo">
    <h1>Gallery</h1>
    <p class="subtitle">ผลงานที่รังสรรค์ด้วยความประณีต</p>

    <div class="section-title">Custom Guitars</div>
    <div class="gallery-grid">
      <img src="guitar1.jpg" alt="Guitar 1">
      <img src="guitar2.jpg" alt="Guitar 2">
      <img src="guitar3.jpg" alt="Guitar 3">
      <img src="guitar4.jpg" alt="Guitar 4">
      <img src="guitar5.jpg" alt="Guitar 5">
      <img src="guitar6.jpg" alt="Guitar 6">
      <img src="guitar7.jpg" alt="Guitar 7">
      <img src="guitar8.jpg" alt="Guitar 8">
      <img src="guitar9.jpg" alt="Guitar 9">
      <img src="guitar10.jpg" alt="Guitar 10">
      <img src="guitar11.jpg" alt="Guitar 11">
      <img src="guitar12.jpg" alt="Guitar 12">
    </div>

    <div class="section-title">Custom Cues</div>
    <div class="gallery-grid">
      <img src="cue1.jpg" alt="Cue 1">
      <img src="cue2.jpg" alt="Cue 2">
      <img src="cue3.jpg" alt="Cue 3">
      <img src="cue4.jpg" alt="Cue 4">
      <img src="cue5.jpg" alt="Cue 5">
      <img src="cue6.jpg" alt="Cue 6">
      <img src="cue7.jpg" alt="Cue 7">
      <img src="cue8.jpg" alt="Cue 8">
    </div>

    <a href="index.html" class="back-btn" style="text-align: center; margin-top: 40px;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
  </div>
</body>
</html>
