    });
    document.onkeydown = function(e) {
        if (e.keyCode === 123 || 
           (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 105)) || 
           (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 117))) {
            e.preventDefault();

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const currentPath = window.location.pathname.split("/").pop() || "index.html";
        const navLinks = document.querySelectorAll('.header-nav a, .minimal-tabs a');
        
        navLinks.forEach(link => {
          const linkHref = link.getAttribute('href');
          if (linkHref === currentPath || (currentPath.includes('proto') && linkHref.includes('prototype'))) {
            link.classList.add('active');
          }
        });
      });
